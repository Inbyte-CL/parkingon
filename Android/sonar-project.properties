# SonarCloud configuration for ParkingOnStreet project

# Información del proyecto
sonar.projectKey=inbyte-cl_parkingon
sonar.projectName=ParkingOnStreet
sonar.projectVersion=1.0
sonar.organization=inbyte-cl

# Servidor
sonar.host.url=https://sonarcloud.io

# Token: configurar en local.properties (sonar.token=...) o variable de entorno SONAR_TOKEN
# sonar.token=

# Código fuente (Kotlin)
sonar.sources=app/src/main/java
sonar.tests=app/src/test,app/src/androidTest
sonar.java.binaries=app/build/tmp/kotlin-classes/debug,app/build/intermediates/javac/debug/classes
sonar.java.libraries=app/libs/*.aar,app/libs/*.jar
sonar.kotlin.file.suffixes=.kt

# Exclusiones
sonar.exclusions=**/build/**,**/tmp/**,**/*.class,**/R.java,**/BuildConfig.java,**/BuildConfig.kt
sonar.cpd.exclusions=**/R.java,**/BuildConfig.java,**/BuildConfig.kt


# Reglas ignoradas (falsos positivos comunes en Android/Kotlin)
sonar.issue.ignore.multicriteria=e1,e2,e3

# Logging de debug controlado por build types
sonar.issue.ignore.multicriteria.e1.ruleKey=kotlin:S4792
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.kt

# Logging necesario para monitoreo en producción
sonar.issue.ignore.multicriteria.e2.ruleKey=kotlin:S2629
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.kt

# Dispatchers de coroutines
sonar.issue.ignore.multicriteria.e3.ruleKey=kotlin:S6310
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.kt
